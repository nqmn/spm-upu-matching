<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padanan Kursus UPU (SPM)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX compilation in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Real program data -->
  <script src="programs_data.js"></script>

  <style>
    /* Custom scrollbar to match the neat UI */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent; 
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1; 
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8; 
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- Inline SVG Icons (Replacing lucide-react for standalone HTML) ---
    const Icon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Calculator = ({ className }) => <Icon className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16.01" y2="14"/><line x1="16" y1="18" x2="16.01" y2="18"/><line x1="12" y1="14" x2="12.01" y2="14"/><line x1="12" y1="18" x2="12.01" y2="18"/><line x1="8" y1="14" x2="8.01" y2="14"/><line x1="8" y1="18" x2="8.01" y2="18"/></Icon>;
    const BookOpen = ({ className }) => <Icon className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
    const Layers = ({ className }) => <Icon className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></Icon>;
    const Award = ({ className }) => <Icon className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></Icon>;
    const Info = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
    const ChevronUp = ({ className }) => <Icon className={className}><polyline points="18 15 12 9 6 15"/></Icon>;
    const ChevronDown = ({ className }) => <Icon className={className}><polyline points="6 9 12 15 18 9"/></Icon>;
    const GraduationCap = ({ className }) => <Icon className={className}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></Icon>;
    const Plus = ({ className }) => <Icon className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Trash2 = ({ className }) => <Icon className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const Library = ({ className }) => <Icon className={className}><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></Icon>;
    const Briefcase = ({ className }) => <Icon className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></Icon>;

    // --- Constants ---
    const GRED_MARKS = {
      'A+': 18, 'A': 16, 'A-': 14,
      'B+': 12, 'B': 10,
      'C+': 8,  'C': 6,
      'D':  4,  'E': 2,  'G': 0,
    };

    const GRADE_ORDER = ['A+', 'A', 'A-', 'B+', 'B', 'C+', 'C', 'D', 'E', 'G'];

    const BERAT_WAJIB = 10;
    const BERAT_PILIHAN = 15;
    const BERAT_TAMBAHAN = 5;

    const SUBJEK_WAJIB = ['Bahasa Melayu', 'Bahasa Inggeris', 'Matematik', 'Sejarah'];

    const ALL_SUBJECTS = [
      'Biologi', 'Fizik', 'Kimia', 'Matematik Tambahan',
      'Sains Tambahan', 'Grafik Komunikasi Teknikal', 'Asas Kelestarian',
      'Pertanian', 'Sains Rumah Tangga', 'Reka Cipta', 'Sains Komputer',
      'Sains Sukan', 'Pengajian Kejuruteraan Awam',
      'Pengajian Kejuruteraan Mekanikal',
      'Pengajian Kejuruteraan Elektrik & Elektronik', 'Lukisan Kejuruteraan',
      'Produksi Reka Tanda', 'Hiasan Dalaman', 'Kerja Paip Domestik',
      'Pembinaan Domestik', 'Pembuatan Perabot', 'Reka Bentuk Grafik Digital',
      'Produksi Multimedia', 'Katering dan Penyajian', 'Pemprosesan Makanan',
      'Rekaan dan Jahitan Pakaian', 'Penggayaan Rambut',
      'Asuhan dan Pendidikan Awal Kanak-Kanak', 'Geomatik',
      'Pendawaian Domestik', 'Menservis Peralatan Elektrik Domestik',
      'Menservis Automobil', 'Kimpalan Arka dan Gas', 'Menservis Motosikal',
      'Menservis Peralatan Penyejukan dan Penyaman Udara',
      'Landskap dan Nurseri', 'Tanaman Makanan', 'Akuakultur dan Haiwan Rekreasi',
      'Pendidikan Islam', 'Pendidikan Moral', 'Pendidikan Syariah Islamiah',
      'Geografi', 'Prinsip Perakaunan', 'Ekonomi', 'Perniagaan',
      'Bahasa Arab', 'Bahasa Arab Tinggi', 'Kesusasteraan Melayu',
      'Kesusasteraan Inggeris', 'Pengajian Keusahawanan', 'Sains'
    ].sort();

    const PILIHAN_POOL = {
      'STEM_A': ['Biologi', 'Fizik', 'Kimia', 'Matematik Tambahan'],
      'STEM_B': ['Biologi', 'Fizik', 'Kimia', 'Sains Tambahan', 'Grafik Komunikasi Teknikal', 'Asas Kelestarian', 'Pertanian', 'Sains Rumah Tangga', 'Reka Cipta'],
      'STEM_C': ['Sains Tambahan', 'Grafik Komunikasi Teknikal', 'Asas Kelestarian', 'Pertanian', 'Sains Rumah Tangga', 'Reka Cipta', 'Sains Komputer', 'Sains Sukan', 'Pengajian Kejuruteraan Awam', 'Pengajian Kejuruteraan Mekanikal', 'Pengajian Kejuruteraan Elektrik & Elektronik', 'Lukisan Kejuruteraan', 'Produksi Reka Tanda', 'Hiasan Dalaman', 'Kerja Paip Domestik', 'Pembinaan Domestik', 'Pembuatan Perabot', 'Reka Bentuk Grafik Digital', 'Produksi Multimedia', 'Katering dan Penyajian', 'Pemprosesan Makanan', 'Rekaan dan Jahitan Pakaian', 'Penggayaan Rambut', 'Asuhan dan Pendidikan Awal Kanak-Kanak', 'Geomatik', 'Pendawaian Domestik', 'Menservis Peralatan Elektrik Domestik', 'Menservis Automobil', 'Kimpalan Arka dan Gas', 'Menservis Motosikal', 'Menservis Peralatan Penyejukan dan Penyaman Udara', 'Landskap dan Nurseri', 'Tanaman Makanan', 'Akuakultur dan Haiwan Rekreasi']
    };

    const SEMUA_STEM = new Set([...PILIHAN_POOL.STEM_A, ...PILIHAN_POOL.STEM_B, ...PILIHAN_POOL.STEM_C]);

    const STREAM_LABELS = {
      'STEM_A': 'STEM A',
      'STEM_B': 'STEM B',
      'STEM_C': 'STEM C',
      'KSI': 'Kemanusiaan / Sastera / Ikhtisas (KSI)'
    };

    // PROGRAMS_DATA is loaded from programs_data.js

    // Pakej compatibility: which Pakej_Min values a student pakej qualifies for
    const pakejCompatible = (studentPakej, programPakejMin) => {
      if (!programPakejMin || programPakejMin === 'Semua Pakej') return true;
      if (programPakejMin === 'STEM A') return studentPakej === 'STEM_A';
      if (programPakejMin === 'STEM A atau B') return studentPakej === 'STEM_A' || studentPakej === 'STEM_B';
      if (programPakejMin === 'STEM A, B atau C') return studentPakej === 'STEM_A' || studentPakej === 'STEM_B' || studentPakej === 'STEM_C';
      return true;
    };

    // --- Syarat Khas Formatter ---
    const SyaratKhas = ({ text }) => {
      if (!text) return <span className="text-slate-400 italic">-</span>;

      // Split into individual "Mendapat..." blocks
      const blocks = text.split(/(?=Mendapat)/).map(s => s.trim()).filter(Boolean);

      return (
        <ol className="space-y-2">
          {blocks.map((block, i) => {
            // Separate the header (before first bullet) from the subject list
            const bulletIdx = block.indexOf('•');
            const header = (bulletIdx === -1 ? block : block.slice(0, bulletIdx)).trim().replace(/:$/, '').trim();
            const subjectsPart = bulletIdx === -1 ? '' : block.slice(bulletIdx);

            // Split subjects on bullet, handle ATAU between groups
            const subjects = subjectsPart
              .split('•')
              .map(s => s.trim())
              .filter(Boolean);

            // Check if this block ends with ATAU (linking to next block)
            const hasAtau = header.toUpperCase().includes('ATAU') || block.toUpperCase().endsWith('ATAU');
            const cleanHeader = header.replace(/\s+ATAU\s*$/i, '').trim();

            return (
              <li key={i} className="flex gap-2">
                <span className="text-slate-400 font-bold text-xs mt-0.5 flex-shrink-0">{i + 1}.</span>
                <div className="flex-1">
                  <p className="text-slate-700 text-xs leading-relaxed">{cleanHeader}</p>
                  {subjects.length > 0 && (
                    <ul className="mt-1 space-y-0.5 pl-2 border-l-2 border-slate-200">
                      {subjects.map((subj, j) => {
                        const isAtau = subj.toUpperCase().endsWith('ATAU');
                        const cleanSubj = subj.replace(/\s+ATAU\s*$/i, '').trim();
                        return (
                          <li key={j} className="text-xs text-slate-600 flex items-baseline gap-1">
                            <span className="text-slate-300 flex-shrink-0">–</span>
                            <span>{cleanSubj}{isAtau && <span className="text-slate-400 italic ml-1 text-[10px]">atau</span>}</span>
                          </li>
                        );
                      })}
                    </ul>
                  )}
                  {hasAtau && subjects.length === 0 && (
                    <p className="text-slate-400 italic text-[10px] mt-0.5">atau</p>
                  )}
                </div>
              </li>
            );
          })}
        </ol>
      );
    };

    // --- Logik Semakan Kelayakan ---
    const memenuhiGred = (dimiliki, diperlukan) => {
      if (!diperlukan) return true;
      if (!dimiliki) return false;
      const idxDimiliki = GRADE_ORDER.indexOf(dimiliki);
      const idxDiperlukan = GRADE_ORDER.indexOf(diperlukan);
      if (idxDimiliki === -1 || idxDiperlukan === -1) return false;
      return idxDimiliki <= idxDiperlukan; // Index kecil = gred lagi bagus
    };

    const semakLayak = (studentGred, program) => {
      let sebabGagal = [];
      let dikira = new Set();

      const REQ_COLS = {
        'Req_BM': 'Bahasa Melayu', 'Req_BI': 'Bahasa Inggeris', 'Req_Sejarah': 'Sejarah',
        'Req_Math': 'Matematik', 'Req_AddMath': 'Matematik Tambahan', 'Req_Fizik': 'Fizik',
        'Req_Kimia': 'Kimia', 'Req_Bio': 'Biologi', 'Req_Sains': 'Sains',
        'Req_PI': 'Pendidikan Islam', 'Req_BahasaArab': 'Bahasa Arab',
      };

      // 1. Mandatory Subjects
      for (const [col, subj] of Object.entries(REQ_COLS)) {
        const reqGred = program[col];
        if (reqGred) {
          const gredStudent = studentGred[subj];
          if (!memenuhiGred(gredStudent, reqGred)) {
            sebabGagal.push(`${subj}: Gred ${reqGred}`);
          }
          dikira.add(subj);
        }
      }

      // 2. Choice Options (Pilihan)
      for (let n = 1; n <= 8; n++) {
        const gredReq = program[`Pilihan_${n}_Gred`];
        const bilStr = program[`Pilihan_${n}_Bil`];
        const subjekStr = program[`Pilihan_${n}_Subjek`];

        if (gredReq && bilStr && subjekStr) {
          const bil = parseInt(bilStr);
          const subjekList = subjekStr.split('|');
          const lulus = subjekList.filter(s => memenuhiGred(studentGred[s], gredReq));
          subjekList.forEach(s => dikira.add(s));

          if (lulus.length < bil) {
            sebabGagal.push(`Perlukan ${bil} daripada (${subjekList.slice(0,2).join(', ')}...) minimum Gred ${gredReq}`);
          }
        }
      }

      // 3. Other Subjects Requirement (Lain-lain)
      const lainGred = program['Lain_Gred'];
      const lainBilStr = program['Lain_Bil'];
      if (lainGred && lainBilStr) {
        const lainBil = parseInt(lainBilStr);
        const lulusLain = Object.entries(studentGred)
          .filter(([s, g]) => !dikira.has(s) && memenuhiGred(g, lainGred));
        if (lulusLain.length < lainBil) {
          sebabGagal.push(`Perlukan tambahan ${lainBil} subjek lain dengan minimum Gred ${lainGred}`);
        }
      }

      const meritMin = parseFloat(program.Merit || 0);

      return {
        layak: sebabGagal.length === 0,
        sebabGagal,
        meritMin
      };
    };

    // Logic for stream classification
    const classifyStream = (subjectsTaken) => {
      const STEM_A_CORE = ['Biologi', 'Fizik', 'Kimia', 'Matematik Tambahan'];
      const STEM_B_EXTRA = ['Sains Tambahan', 'Grafik Komunikasi Teknikal', 'Asas Kelestarian', 'Pertanian', 'Sains Rumah Tangga', 'Reka Cipta'];
      const STEM_C1 = ['Sains Tambahan', 'Grafik Komunikasi Teknikal', 'Asas Kelestarian', 'Pertanian', 'Sains Rumah Tangga', 'Reka Cipta', 'Sains Komputer', 'Sains Sukan', 'Pengajian Kejuruteraan Awam', 'Pengajian Kejuruteraan Mekanikal', 'Pengajian Kejuruteraan Elektrik & Elektronik', 'Lukisan Kejuruteraan'];
      const STEM_C2 = ['Produksi Reka Tanda', 'Hiasan Dalaman', 'Kerja Paip Domestik', 'Pembinaan Domestik', 'Pembuatan Perabot', 'Reka Bentuk Grafik Digital', 'Produksi Multimedia', 'Katering dan Penyajian', 'Pemprosesan Makanan', 'Rekaan dan Jahitan Pakaian', 'Penggayaan Rambut', 'Asuhan dan Pendidikan Awal Kanak-Kanak', 'Geomatik', 'Pendawaian Domestik', 'Menservis Peralatan Elektrik Domestik', 'Menservis Automobil', 'Kimpalan Arka dan Gas', 'Menservis Motosikal', 'Menservis Peralatan Penyejukan dan Penyaman Udara', 'Landskap dan Nurseri', 'Tanaman Makanan', 'Akuakultur dan Haiwan Rekreasi'];
      const BIO_FIZIK_KIMIA = ['Biologi', 'Fizik', 'Kimia'];

      const hasAll = (req, taken) => req.every(s => taken.includes(s));
      const countIntersection = (arr1, arr2) => arr1.filter(s => arr2.includes(s)).length;
      const hasIntersection = (arr1, arr2) => arr1.some(s => arr2.includes(s));

      if (hasAll(STEM_A_CORE, subjectsTaken)) return 'STEM_A';
      const bfkCount = countIntersection(subjectsTaken, BIO_FIZIK_KIMIA);
      const hasStemBExtra = hasIntersection(subjectsTaken, STEM_B_EXTRA);
      if (bfkCount >= 2 && hasStemBExtra) return 'STEM_B';

      const c1Count = countIntersection(subjectsTaken, STEM_C1);
      const c2Count = countIntersection(subjectsTaken, STEM_C2);
      if (c1Count >= 2 || c2Count >= 1) return 'STEM_C';

      return 'KSI';
    };

    function App() {
      const [wajib, setWajib] = useState({
        'Bahasa Melayu': '', 'Bahasa Inggeris': '', 'Matematik': '', 'Sejarah': ''
      });

      const [lainLain, setLainLain] = useState([
        { id: 1, name: '', grade: '' }, { id: 2, name: '', grade: '' },
        { id: 3, name: '', grade: '' }, { id: 4, name: '', grade: '' },
        { id: 5, name: '', grade: '' }
      ]);

      const [koko, setKoko] = useState('');
      const [showDetails, setShowDetails] = useState(false);
      const [expandedCourse, setExpandedCourse] = useState(null);
      const [showBumi, setShowBumi] = useState(true);
      const [showTemuduga, setShowTemuduga] = useState(true);

      const selectedSubjects = useMemo(() => lainLain.map(p => p.name).filter(Boolean), [lainLain]);

      const calc = useMemo(() => {
        const gredToMark = (g) => GRED_MARKS[g] || 0;
        const semuaGred = { ...wajib };
        lainLain.forEach(item => { if (item.name && item.grade) semuaGred[item.name] = item.grade; });
        const subjekDiambil = Object.keys(semuaGred).filter(s => semuaGred[s]);
        const pakej = classifyStream(subjekDiambil);

        let skorWajib = 0;
        SUBJEK_WAJIB.forEach(s => { if (semuaGred[s]) skorWajib += (gredToMark(semuaGred[s]) / 18) * BERAT_WAJIB; });

        let poolPilihan = pakej === 'KSI' 
          ? subjekDiambil.filter(s => !SUBJEK_WAJIB.includes(s) && !SEMUA_STEM.has(s))
          : PILIHAN_POOL[pakej] || [];

        const diambilDariPool = poolPilihan.filter(s => subjekDiambil.includes(s));
        diambilDariPool.sort((a, b) => gredToMark(semuaGred[b]) - gredToMark(semuaGred[a]));
        const pilihanTerpilih = diambilDariPool.slice(0, 2);

        let skorPilihan = 0;
        pilihanTerpilih.forEach(s => { skorPilihan += (gredToMark(semuaGred[s]) / 18) * BERAT_PILIHAN; });

        const setDikecualikan = new Set([...SUBJEK_WAJIB, ...pilihanTerpilih]);
        const calonTambahan = subjekDiambil.filter(s => !setDikecualikan.has(s));
        calonTambahan.sort((a, b) => gredToMark(semuaGred[b]) - gredToMark(semuaGred[a]));
        const tambahanTerpilih = calonTambahan.slice(0, 2);

        let skorTambahan = 0;
        tambahanTerpilih.forEach(s => { skorTambahan += (gredToMark(semuaGred[s]) / 18) * BERAT_TAMBAHAN; });

        const jumlah = skorWajib + skorPilihan + skorTambahan;
        const kokoVal = Math.min(Math.max(parseFloat(koko) || 0, 0), 10);
        const merit = ((jumlah / 80) * 90) + kokoVal;

        const isComplete = Object.values(wajib).every(Boolean);

        // --- Kursus Yang Boleh Dimohon ---
        let eligibleCourses = [];
        if (isComplete) {
          const programs = typeof PROGRAMS_DATA !== 'undefined' ? PROGRAMS_DATA : [];
          programs.forEach(prog => {
            if (!pakejCompatible(pakej, prog.Pakej_Min)) return;
            const kelayakan = semakLayak(semuaGred, prog);
            if (kelayakan.layak && merit >= kelayakan.meritMin) {
              eligibleCourses.push(prog);
            }
          });
          eligibleCourses.sort((a, b) => (b.Merit || 0) - (a.Merit || 0));
        }

        return {
          skorWajib: skorWajib.toFixed(2), skorPilihan: skorPilihan.toFixed(2), skorTambahan: skorTambahan.toFixed(2),
          jumlah: jumlah.toFixed(2), kokoVal: kokoVal.toFixed(2), merit: merit.toFixed(2),
          pakej, pilihanTerpilih, tambahanTerpilih, isComplete,
          eligibleCourses
        };
      }, [wajib, lainLain, koko]);

      const handleWajibChange = (subj, val) => setWajib(prev => ({ ...prev, [subj]: val }));
      const handleLainChange = (id, field, val) => setLainLain(prev => prev.map(p => p.id === id ? { ...p, [field]: val } : p));
      const addSubject = () => {
        const newId = lainLain.length > 0 ? Math.max(...lainLain.map(l => l.id)) + 1 : 1;
        setLainLain(prev => [...prev, { id: newId, name: '', grade: '' }]);
      };
      const removeSubject = (id) => setLainLain(prev => prev.filter(p => p.id !== id));

      const GradeSelect = ({ value, onChange, placeholder = "Gred" }) => (
        <select value={value} onChange={e => onChange(e.target.value)}
          className="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none appearance-none font-semibold text-center h-[46px]"
        >
          <option value="">{placeholder}</option>
          {Object.keys(GRED_MARKS).map(g => <option key={g} value={g}>{g}</option>)}
        </select>
      );

      const SubjectSelect = ({ value, onChange, exclude = [] }) => (
        <select value={value} onChange={e => onChange(e.target.value)}
          className="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none h-[46px]"
        >
          <option value="">Pilih Subjek</option>
          {ALL_SUBJECTS.map(subj => (
            <option key={subj} value={subj} disabled={exclude.includes(subj) && subj !== value}>{subj}</option>
          ))}
        </select>
      );

      return (
        <div className="min-h-screen bg-slate-100 font-sans pb-32">
          <header className="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-10">
            <div className="max-w-xl mx-auto flex items-center gap-3">
              <Calculator className="w-6 h-6" />
              <h1 className="text-xl font-bold tracking-tight">Padanan Kursus UPU (SPM)</h1>
            </div>
          </header>

          <main className="max-w-xl mx-auto p-4 space-y-6">
            <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 flex gap-3 text-sm text-blue-800 shadow-sm">
              <Info className="w-5 h-5 flex-shrink-0 mt-0.5 text-blue-600" />
              <p>
                Masukkan keputusan SPM anda di bawah. Senarai kursus UPU akan dipadankan berdasarkan keputusan anda.
                <br />
                Sistem akan secara automatik memilih <strong>2 subjek Pilihan terbaik</strong> dan <strong>maksimum 2 subjek Tambahan terbaik</strong> untuk merit maksimum.
              </p>
            </div>

            {selectedSubjects.length > 0 && (
              <div className="bg-white rounded-xl shadow-sm p-4 flex items-center justify-between border border-gray-100">
                <div className="flex items-center gap-2 text-slate-600 font-medium text-sm">
                  <GraduationCap className="w-5 h-5 text-indigo-500" /> Klasifikasi Aliran:
                </div>
                <span className="bg-indigo-100 text-indigo-800 text-xs font-bold px-2.5 py-1 rounded-full text-center">
                  {STREAM_LABELS[calc.pakej] || calc.pakej}
                </span>
              </div>
            )}

            {/* 1. Subjek Wajib */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex items-center gap-2">
                <BookOpen className="w-5 h-5 text-slate-500" />
                <h2 className="font-semibold text-slate-800">1. Subjek Wajib</h2>
              </div>
              <div className="p-4 space-y-3">
                {SUBJEK_WAJIB.map((subj) => (
                  <div key={subj} className="flex gap-3 items-center">
                    <div className="flex-1 text-sm font-medium text-slate-700">{subj}</div>
                    <div className="w-24">
                      <GradeSelect value={wajib[subj]} onChange={(val) => handleWajibChange(subj, val)} />
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* 2. Subjek Lain */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex items-center gap-2">
                <Layers className="w-5 h-5 text-slate-500" />
                <h2 className="font-semibold text-slate-800">2. Subjek-subjek Lain</h2>
              </div>
              <div className="p-4 space-y-4">
                <p className="text-xs text-slate-500 leading-relaxed">Masukkan subjek lain yang anda ambil.</p>
                {lainLain.map((p) => (
                  <div key={p.id} className="flex gap-2 items-center">
                    <div className="flex-1"><SubjectSelect value={p.name} onChange={(val) => handleLainChange(p.id, 'name', val)} exclude={selectedSubjects}/></div>
                    <div className="w-[85px]"><GradeSelect value={p.grade} onChange={(val) => handleLainChange(p.id, 'grade', val)} /></div>
                    <button onClick={() => removeSubject(p.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Trash2 className="w-5 h-5" /></button>
                  </div>
                ))}
                <button onClick={addSubject} className="w-full py-2 flex items-center justify-center gap-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors">
                  <Plus className="w-4 h-4" /> Tambah Subjek Lain
                </button>
              </div>
            </section>

            {/* 3. Ko-Kurikulum */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex items-center gap-2">
                <Award className="w-5 h-5 text-slate-500" />
                <h2 className="font-semibold text-slate-800">3. Ko-Kurikulum</h2>
              </div>
              <div className="p-4 flex items-center gap-4">
                <div className="flex-1 text-sm text-slate-600">Markah ko-kurikulum anda (0.00 - 10.00).</div>
                <div className="w-24 relative">
                  <input type="number" min="0" max="10" step="0.01" value={koko} onChange={(e) => setKoko(e.target.value)} placeholder="0.00" className="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 font-bold text-center h-[46px] outline-none" />
                </div>
              </div>
            </section>

            {/* 4. Senarai Kursus */}
            {calc.isComplete && (
              <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-8 transition-all duration-300">
                <div className="bg-blue-600 px-4 py-3 flex items-center gap-2 text-white">
                  <Library className="w-5 h-5" />
                  <h2 className="font-semibold">4. Kursus Yang Boleh Dimohon</h2>
                  <span className="ml-auto text-xs font-bold bg-white/20 px-2.5 py-1 rounded-full">
                    {calc.eligibleCourses.filter(p => (showBumi || p.Bumiputera_Sahaja !== 'Ya') && (showTemuduga || p.Bertemu_Duga !== 'Ya')).length} Layak
                  </span>
                </div>

                <div className="px-4 py-2.5 border-b border-slate-100 flex items-center gap-4 bg-slate-50">
                  <span className="text-xs text-slate-500 font-medium">Tunjuk:</span>
                  <label className="flex items-center gap-1.5 cursor-pointer select-none">
                    <input type="checkbox" checked={showBumi} onChange={e => setShowBumi(e.target.checked)}
                      className="w-3.5 h-3.5 accent-orange-500 cursor-pointer" />
                    <span className="text-xs font-semibold text-orange-700">Bumiputera Sahaja</span>
                  </label>
                  <label className="flex items-center gap-1.5 cursor-pointer select-none">
                    <input type="checkbox" checked={showTemuduga} onChange={e => setShowTemuduga(e.target.checked)}
                      className="w-3.5 h-3.5 accent-purple-500 cursor-pointer" />
                    <span className="text-xs font-semibold text-purple-700">Temu Duga</span>
                  </label>
                </div>

                <div className="p-0 divide-y divide-slate-100">
                  {calc.eligibleCourses.filter(p => (showBumi || p.Bumiputera_Sahaja !== 'Ya') && (showTemuduga || p.Bertemu_Duga !== 'Ya')).length === 0 ? (
                    <div className="p-6 text-center text-slate-500 text-sm">
                      Tiada program yang sepadan dengan keputusan dan merit anda pada masa ini.
                    </div>
                  ) : (
                    calc.eligibleCourses.filter(p => (showBumi || p.Bumiputera_Sahaja !== 'Ya') && (showTemuduga || p.Bertemu_Duga !== 'Ya')).map((prog) => {
                      const isExpanded = expandedCourse === prog.Id;
                      return (
                        <div key={prog.Id} className="group">
                          <button 
                            onClick={() => setExpandedCourse(isExpanded ? null : prog.Id)}
                            className="w-full text-left px-4 py-4 focus:outline-none hover:bg-slate-50 transition-colors flex justify-between items-start gap-4"
                          >
                            <div className="flex-1">
                              <h3 className="font-bold text-slate-800 text-sm">{prog.Nama_Program}</h3>
                              <p className="text-xs text-slate-500 mt-1 flex items-center gap-1">
                                <Briefcase className="w-3 h-3" />
                                {prog.IPTA} ({prog.Kod_Program})
                              </p>
                              <div className="flex flex-wrap gap-1 mt-1.5">
                                {prog.Pakej_Min && prog.Pakej_Min !== 'Semua Pakej' && (
                                  <span className="text-[10px] font-semibold text-blue-700 bg-blue-50 border border-blue-200 px-1.5 py-0.5 rounded">
                                    {prog.Pakej_Min}
                                  </span>
                                )}
                                {prog.Bumiputera_Sahaja === 'Ya' && (
                                  <span className="text-[10px] font-semibold text-orange-700 bg-orange-50 border border-orange-200 px-1.5 py-0.5 rounded">
                                    Bumiputera Sahaja
                                  </span>
                                )}
                                {prog.Bertemu_Duga === 'Ya' && (
                                  <span className="text-[10px] font-semibold text-purple-700 bg-purple-50 border border-purple-200 px-1.5 py-0.5 rounded">
                                    Temu Duga
                                  </span>
                                )}
                              </div>
                            </div>
                            <div className="text-right flex flex-col items-end gap-1 flex-shrink-0">
                              <span className="text-xs font-semibold text-emerald-600 bg-emerald-50 border border-emerald-100 px-2 py-0.5 rounded">
                                Merit &gt; {prog.Merit.toFixed(1)}
                              </span>
                              {isExpanded ? <ChevronUp className="w-4 h-4 text-slate-400" /> : <ChevronDown className="w-4 h-4 text-slate-400" />}
                            </div>
                          </button>

                          <div className={`overflow-hidden transition-all duration-200 ${isExpanded ? 'max-h-[800px] border-t border-slate-100 bg-slate-50' : 'max-h-0'}`}>
                            <div className="p-4 space-y-4 text-sm">
                              <div>
                                <span className="font-bold text-slate-700 block mb-1 text-xs uppercase tracking-wider">Syarat Khas Program</span>
                                <div className="bg-white p-3 rounded-lg border border-slate-200">
                                  <SyaratKhas text={prog.Syarat_Khas} />
                                </div>
                              </div>
                              <div className="grid grid-cols-2 gap-3">
                                <div className="bg-white p-3 rounded-lg border border-slate-200">
                                  <span className="text-slate-500 text-[10px] uppercase font-bold tracking-wider block mb-0.5">Peringkat Pengajian</span>
                                  <span className="text-slate-800 font-medium text-xs">{prog.Peringkat_Pengajian || '-'}</span>
                                </div>
                                <div className="bg-white p-3 rounded-lg border border-slate-200">
                                  <span className="text-slate-500 text-[10px] uppercase font-bold tracking-wider block mb-0.5">Tempoh Pengajian</span>
                                  <span className="text-slate-800 font-medium text-xs">{prog.Tempoh_Pengajian || '-'}</span>
                                </div>
                                {prog.Bidang_NEC && (
                                  <div className="bg-white p-3 rounded-lg border border-slate-200 col-span-2">
                                    <span className="text-slate-500 text-[10px] uppercase font-bold tracking-wider block mb-0.5">Bidang</span>
                                    <span className="text-slate-800 font-medium text-xs">{prog.Bidang_NEC}</span>
                                  </div>
                                )}
                              </div>
                            </div>
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
                <div className="p-3 bg-slate-50 border-t border-slate-100 text-[10px] text-slate-400 text-center">
                  *Data program berdasarkan senarai program pengajian UPU Kategori A (SPM) 2026.
                </div>
              </section>
            )}
          </main>

          {/* Floating Bottom Bar */}
          <div className="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] border-t border-slate-200 z-50 transition-all duration-300">
            <div className={`overflow-y-auto transition-all duration-300 ${showDetails ? 'max-h-[50vh] border-b border-slate-100' : 'max-h-0'}`}>
              <div className="p-4 max-w-xl mx-auto space-y-3 text-sm">
                <h3 className="font-bold text-slate-800 mb-2">Pecahan Markah Akademik</h3>
                <div className="flex justify-between items-center text-slate-600 border-b border-slate-100 pb-2">
                  <span>Wajib (Maks 40)</span><span className="font-mono">{calc.skorWajib}</span>
                </div>
                <div className="flex flex-col text-slate-600 border-b border-slate-100 pb-2">
                  <div className="flex justify-between items-center">
                    <span>Pilihan (Maks 30)</span><span className="font-mono text-emerald-600 font-semibold">{calc.skorPilihan}</span>
                  </div>
                  <div className="text-xs text-slate-400 mt-1 pl-2 border-l-2 border-emerald-200">Subjek: {calc.pilihanTerpilih.join(', ') || '-'}</div>
                </div>
                <div className="flex flex-col text-slate-600 border-b border-slate-100 pb-2">
                  <div className="flex justify-between items-center">
                    <span>Tambahan (Maks 10)</span><span className="font-mono text-amber-600 font-semibold">{calc.skorTambahan}</span>
                  </div>
                  <div className="text-xs text-slate-400 mt-1 pl-2 border-l-2 border-amber-200">Subjek: {calc.tambahanTerpilih.join(', ') || '-'}</div>
                </div>
                <div className="flex justify-between items-center font-bold text-slate-800 pt-1">
                  <span>Jumlah Akademik (Maks 80)</span><span className="font-mono">{calc.jumlah}</span>
                </div>
              </div>
            </div>

            <div className="max-w-xl mx-auto flex items-center justify-between p-4 bg-white">
              <button onClick={() => setShowDetails(!showDetails)} className="flex items-center gap-1.5 text-blue-600 font-medium text-sm hover:text-blue-800 focus:outline-none bg-blue-50 px-3 py-2 rounded-lg">
                Pecahan Merit
                {showDetails ? <ChevronDown className="w-4 h-4" /> : <ChevronUp className="w-4 h-4" />}
              </button>
              <div className="text-right">
                <div className="text-xs text-slate-500 font-medium uppercase tracking-wide">Jumlah Merit</div>
                <div className={`text-3xl font-black ${!calc.isComplete ? 'text-slate-400' : 'text-blue-700'}`}>
                  {calc.merit}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
